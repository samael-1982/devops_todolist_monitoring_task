apiVersion: v1
kind: Service
metadata:
  name: todoapp-mysql
  labels:
    app.kubernetes.io/name: todoapp-mysql
spec:
  selector:
    app.kubernetes.io/name: todoapp-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: todoapp-mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todoapp-mysql
    spec:
      containers:
        - name: mysql
          image: {{ .Values.mysql.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: todoapp-secrets
                  key: DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: todoapp-secrets
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todoapp-secrets
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todoapp-secrets
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
